<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Python Practice</title>
    
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Pyodide - Python in the browser -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 HSC Python Practice</h1>
            <p>Practice HSC-style Python programming questions with instant feedback</p>
        </div>
        
        <div id="loading" class="loading">
            Loading Python environment... This may take a moment on first load.
        </div>
        
        <div id="main-content" style="display: none;">
            <div class="content">
                <div class="question-section">
                    <div class="question-header">
                        <h2 class="question-title" id="question-title">Question will appear here</h2>
                        <span class="marks-badge" id="marks-badge">0 marks</span>
                    </div>
                    <div class="question-description" id="question-description">
                        Click "Generate New Question" to start practicing!
                    </div>
                </div>
                
                <div class="editor-section">
                    <h3 class="section-title">💻 Your Code</h3>
                    <textarea id="code-editor" spellcheck="false"># Write your Python code here

</textarea>
                    <div class="button-group">
                        <button id="run-btn">▶ Run Code</button>
                        <button id="submit-btn">✓ Submit for Feedback</button>
                        <button id="generate-btn">🎲 Generate New Question</button>
                        <button id="clear-btn">🗑 Clear Output</button>
                    </div>
                </div>
                
                <div class="output-section">
                    <h3 class="section-title">📺 Output</h3>
                    <div id="output"></div>
                </div>
                
                <div class="feedback-section" id="feedback-section">
                    <h3 class="feedback-title">📝 Feedback</h3>
                    <div class="feedback-content" id="feedback-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Scripts -->
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
